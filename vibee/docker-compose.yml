services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - ./services:/app/services
      - ./settings.py:/app/settings.py
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - partyjam_audio:/tmp/partyjam
      - /app/node_modules
      - /app/apps/api/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ESSENTIA_URL=http://essentia:8000
      - BASE_URL=${BASE_URL:-http://localhost:3000}
    env_file:
      - .env
    depends_on:
      - essentia
    command: sh -c "pnpm install --frozen-lockfile && pnpm --filter @partyjam/shared build && pnpm --filter @partyjam/connectors build && cd /app/apps/api && pnpm dev"

  essentia:
    build:
      context: apps/essentia
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    volumes:
      - ./apps/essentia:/app
      - partyjam_audio:/tmp/partyjam
    environment:
      - PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    env_file:
      - .env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  partyjam_audio:
    name: partyjam_audio
