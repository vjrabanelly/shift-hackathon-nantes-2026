; Active OPcache
opcache.enable=1
opcache.enable_cli=1

; Mémoire allouée au cache (en MB) — 256 est bien pour Moodle
opcache.memory_consumption=256

; Nombre de fichiers max en cache (Moodle en a beaucoup)
opcache.max_accelerated_files=20000

; Vérifie les changements de fichiers toutes les N secondes
; En dev : 1 ou 2 pour voir tes modifs rapidement
; En prod : 60+ (voire 0 = jamais)
opcache.revalidate_freq=1

; Optimisations supplémentaires
opcache.interned_strings_buffer=16
opcache.fast_shutdown=1